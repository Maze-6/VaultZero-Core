name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pycryptodome aiofiles

      - name: Run tests (excluding watchdog — requires local filesystem)
        run: |
          pytest tests/ -v --ignore=tests/test_watchdog.py --tb=short

      - name: Show test summary
        if: always()
        run: |
          pytest tests/ --ignore=tests/test_watchdog.py -q 2>&1 | tail -5
